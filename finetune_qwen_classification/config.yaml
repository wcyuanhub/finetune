# 电商评论文本分类微调配置文件

# =============================================================================
# 模型配置
# =============================================================================
model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  # 本地路径（如果已下载）
  local_path: ""
  # 模型缓存目录
  cache_dir: "./model_cache"

# =============================================================================
# 任务配置
# =============================================================================
task:
  type: "seq_cls"           # 文本分类任务
  num_labels: 3            # 分类数量: 0=负面, 1=中性, 2=正面
  labels:
    - "负面"
    - "中性"
    - "正面"

# =============================================================================
# 数据配置
# =============================================================================
data:
  # 原始数据目录
  raw_dir: "./data"
  # 处理后数据目录
  processed_dir: "./data/processed"
  # 训练数据
  train_file: "./data/processed/train.jsonl"
  # 验证数据
  val_file: "./data/processed/val.jsonl"
  # 最大序列长度
  max_length: 512
  # 训练集比例
  train_ratio: 0.8

# =============================================================================
# 训练配置
# =============================================================================
training:
  # 训练轮数
  num_epochs: 3
  # 批次大小 (24GB 显存建议 4-8)
  batch_size: 4
  # 学习率
  learning_rate: 1e-4
  # 梯度累积步数
  gradient_accumulation_steps: 4
  # 权重衰减
  weight_decay: 0.01
  # 预热比例
  warmup_ratio: 0.05
  # 学习率调度器
  lr_scheduler: "cosine"
  # 随机种子
  seed: 42
  # 最大梯度范数
  max_grad_norm: 1.0
  # 梯度检查点
  gradient_checkpointing: true

# =============================================================================
# LoRA 配置
# =============================================================================
lora:
  # 启用 LoRA
  enabled: true
  # LoRA 类型
  sft_type: "lora"
  # LoRA rank
  rank: 8
  # LoRA alpha
  alpha: 16
  # LoRA dropout
  dropout: 0.05
  # 应用目标层
  target: "all"
  # bias 配置
  bias: "none"
  # 任务类型
  task_type: "CAUSAL_LM"

# =============================================================================
# 输出配置
# =============================================================================
output:
  # 输出目录
  output_dir: "./output"
  # 日志目录
  log_dir: "./logs"
  # 保存策略
  save_strategy: "steps"
  # 保存步数
  save_steps: 100
  # 只保存最后一个 checkpoint
  save_only_last_checkpoint: true
  # 日志步数
  logging_steps: 10
  # 评估步数
  eval_steps: 100
  # 执行评估
  do_eval: true
  # 早停
  early_stopping: false
  # 早停耐心值
  early_stopping_patience: 3

# =============================================================================
# 硬件配置
# =============================================================================
hardware:
  # GPU 数量
  gpu_count: 1
  # 数据加载线程数
  num_workers: 4
  # 使用 Flash Attention (A100/H100 设置为 true)
  use_flash_attn: false
  # 混合精度
  fp16: true
  # bf16 (如果 GPU 支持)
  bf16: false

# =============================================================================
# 预测配置 (用于推理)
# =============================================================================
inference:
  # 微调后模型路径
  checkpoint_dir: "./output/checkpoint-xxx"
  # 最大生成长度
  max_new_tokens: 10
  # 温度
  temperature: 0.1
  # Top-p 采样
  top_p: 0.9
  # 是否采样
  do_sample: false
